name: Build GUI

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload artifacts to release (tag push only)'
        required: false
        default: false
        type: boolean

jobs:
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: Windows-x64
            artifact: MkPFS-Windows-x64.exe
          - os: macos-latest
            target: macOS-Universal
            artifact: MkPFS-macOS-Universal.zip
          - os: ubuntu-latest
            target: Linux-x64
            artifact: MkPFS-Linux-x64.AppImage

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      # ------------------------------------------------------------------ #
      # Windows: single-file executable
      # ------------------------------------------------------------------ #
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          uv run pyinstaller \
            --name MkPFS \
            --onefile \
            --windowed \
            --icon assets/icon.ico \
            --collect-data customtkinter \
            --distpath dist-gui \
            scripts/gui-entry.py

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Move-Item -Path "dist-gui/MkPFS.exe" -Destination "${{ matrix.artifact }}"
          echo "artifact_name=${{ matrix.artifact }}" >> $env:GITHUB_ENV

      # ------------------------------------------------------------------ #
      # macOS: .app bundle with optional code signing
      # ------------------------------------------------------------------ #
      - name: Convert icon to ICNS (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p icon.iconset
          sips -z 16 16   assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32   assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32   assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64   assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out icon.iconset/icon_256x256@2x.png
          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          uv run pyinstaller \
            --name MkPFS \
            --windowed \
            --osx-bundle-identifier com.psbrew.mkpfs \
            --icon assets/icon.icns \
            --collect-data customtkinter \
            --distpath dist-gui \
            scripts/gui-entry.py

      - name: Sign (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          codesign --deep --force --sign - "dist-gui/MkPFS.app"
          echo "Ad-hoc signed dist-gui/MkPFS.app"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist-gui/MkPFS.app" "${{ matrix.artifact }}"
          echo "artifact_name=${{ matrix.artifact }}" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------ #
      # Linux: single binary wrapped as AppImage
      # ------------------------------------------------------------------ #
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pyinstaller \
            --name MkPFS \
            --onefile \
            --windowed \
            --collect-data customtkinter \
            --distpath dist-gui \
            scripts/gui-entry.py

      - name: Package AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2

          binary="dist-gui/MkPFS"
          appdir="MkPFS.AppDir"
          mkdir -p "$appdir/usr/bin"
          cp "$binary" "$appdir/usr/bin/MkPFS"
          chmod +x "$appdir/usr/bin/MkPFS"

          printf '%s\n' '[Desktop Entry]' 'Name=MkPFS' 'Exec=MkPFS' 'Icon=mkpfs' \
            'Type=Application' 'Categories=Utility;' 'Comment=PlayStation File System Builder' \
            > "$appdir/MkPFS.desktop"

          cp assets/icon.png "$appdir/mkpfs.png"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -O linuxdeploy
          chmod +x linuxdeploy
          ./linuxdeploy --appdir "$appdir" --output appimage

          mv MkPFS-x86_64.AppImage "${{ matrix.artifact }}"
          echo "artifact_name=${{ matrix.artifact }}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: ${{ env.artifact_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.upload_release
    needs: build-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release notes from commits
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          prev=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || echo "")
          if [ -z "$prev" ]; then
            range=""
          else
            range="${prev}..${tag}"
          fi
          {
            echo "## Changes"
            echo ""
            git log --pretty=format:'- %s' --no-merges "$range"
          } > release_notes.md
          echo "body_path=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: ${{ steps.notes.outputs.body_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
