name: Build GUI

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload artifacts to release (tag push only)'
        required: false
        default: false
        type: boolean

jobs:
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: Windows-x64
            ext: .exe
          - os: macos-latest
            target: macOS-Universal
            ext: ""
          - os: ubuntu-latest
            target: Linux-x64
            ext: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build single binary
        shell: bash
        run: |
          uv run pyinstaller \
            --name "MkPFS${{ matrix.ext }}" \
            --onefile \
            --windowed \
            --collect-data customtkinter \
            --distpath dist-gui \
            scripts/gui-entry.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dest = "MkPFS-${{ matrix.target }}${{ matrix.ext }}"
          Move-Item -Path "dist-gui/MkPFS${{ matrix.ext }}" -Destination "$dest"
          echo "artifact_name=$dest" >> $env:GITHUB_ENV

      - name: Package artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          dest="MkPFS-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist-gui/MkPFS${{ matrix.ext }}" "$dest"
          chmod +x "$dest"
          echo "artifact_name=$dest" >> "$GITHUB_ENV"

      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2

          binary="dist-gui/MkPFS"
          appdir="MkPFS.AppDir"
          mkdir -p "$appdir/usr/bin"
          cp "$binary" "$appdir/usr/bin/MkPFS"
          chmod +x "$appdir/usr/bin/MkPFS"

          printf '%s\n' '[Desktop Entry]' 'Name=MkPFS' 'Exec=MkPFS' 'Icon=mkpfs' \
            'Type=Application' 'Categories=Utility;' 'Comment=PlayStation File System Builder' \
            > "$appdir/MkPFS.desktop"

          touch "$appdir/mkpfs.png"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -O linuxdeploy
          chmod +x linuxdeploy
          ./linuxdeploy --appdir "$appdir" --output appimage

          mv MkPFS-*-x86_64.AppImage "MkPFS-${{ matrix.target }}.AppImage"
          echo "artifact_name=MkPFS-${{ matrix.target }}.AppImage" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: MkPFS-${{ matrix.target }}
          path: ${{ env.artifact_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.upload_release
    needs: build-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release notes from commits
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          prev=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || echo "")
          if [ -z "$prev" ]; then
            range=""
          else
            range="${prev}..${tag}"
          fi
          {
            echo "## Changes"
            echo ""
            git log --pretty=format:'- %s' --no-merges "$range"
          } > release_notes.md
          echo "body_path=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: ${{ steps.notes.outputs.body_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
